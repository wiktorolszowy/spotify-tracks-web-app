name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      # Runs black, isort, ruff, and the hygiene/secret hooks.
      - name: Pre-commit hooks
        run: uv run pre-commit run --all-files

      # Real-data test auto-skips (SPOTIFY_RUN_REAL_DATA_TESTS unset), so CI
      # needs no dataset.
      - name: Tests
        run: uv run pytest -q
