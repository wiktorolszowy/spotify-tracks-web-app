# Pre-commit hooks: run `pre-commit install` once, then they run on every commit.
# Manual full run: `pre-commit run --all-files`.
default_language_version:
  python: python3.12

repos:
  # Standard hygiene checks.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key

  # Import sorting (kept compatible with black via the "black" profile).
  - repo: https://github.com/PyCQA/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: ["--profile", "black"]

  # Code formatting.
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black

  # Fast linter.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.2
    hooks:
      - id: ruff
        args: ["--fix"]

  # Secret scanning: fails the commit if it looks like a credential is staged.
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
